<!DOCTYPE html>
<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <meta charset="UTF-8">
        <title>RiskDue</title>
    </head>
    <body>

        <h1>RiskDue</h1>
        <p>Deadline Risk Predictor</p>
        <div class="form-container">
        <input type="'text" id="name" placeholder="Assignment Name">
        <input type="date" id="deadline">
        <input type="number" id="hours" placeholder="Estimated Hours">
        <button class="add-btn" onclick="addAssignment()"><i class="fas fa-plus"></i>Add</button>
        <button class="delete-btn" onclick="deleteAssignment(${index})"><i class="fas fa-trash"></i>Delete</button>
        <button class="edit-btn" onclick="editAssignment(${index})"><i class="fas fa-pen"></i>Edit</button>
         </div>
         <div class="dashboard">
    <div class="stat">
        <h3 id="totalTasks">0</h3>
        <p>Total Tasks</p>
    </div>
    <div class="stat">
        <h3 id="highRisk">0</h3>
        <p>High Risk</p>
    </div>
    <div class="stat">
        <h3 id="totalHours">0</h3>
        <p>Total Hours</p>
    </div>
</div>
        <div id="results" class="results-container"></div>

        <script src="script.js"></script>
    </body>
</html>
